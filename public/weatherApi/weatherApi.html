<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Api</title>
    <link rel="stylesheet" href="./css/style.css" type="text/css">

</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name">
            <button><img src="./images/search.png" alt=""></button>
        </div>
<!-- ea4ffe811a2e59ded9493dd13d672698 -->
        <div class="weather">
            <img src="images/rain.png" alt="weatherIamge" class="weather-icon">
            <h1 class="temp">22°C</h1>
            <h2 class="city">Ahm</h2>
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="humadityimage">
                    <div>
                        <p class="humidity">50%</p>
                        <p >Humadity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="wind">
                    <div>
                        <p class="wind">15km/h</p>
                        <p>Wind</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
        <script src="./weather.js"></script>

</body>

</html>
